<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>작업일지 연결 중</title>
    <style>
        /* 프리텐다드(Pretendard) 폰트 사용 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1f; /* 고급스러운 딥 다크 배경 */
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .loading-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        /* 원형 스피너 */
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            /* 스피너 포인트 컬러:  블루 */
            border-top-color: #4facfe; 
            border-radius: 50%;
            /* 탄력 있게 도는 애니메이션 */
            animation: spin 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        /* 텍스트 스타일 및 숨쉬는(Pulse) 애니메이션 */
        .loading-text {
            color: #e2e2e2;
            font-size: 1.15rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            animation: pulse 2s infinite ease-in-out;
        }

        /* 점(...) 애니메이션 - 글자가 움직이며 흔들리지 않도록 width 고정 */
        .dots {
            display: inline-block;
            width: 20px;
            text-align: left;
        }

        .dots::after {
            content: '';
            animation: typing 1.5s infinite steps(4, end);
        }

        /* --- 키프레임 애니메이션 정의 --- */
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { 
                opacity: 0.5; 
            }
            50% { 
                opacity: 1; 
                text-shadow: 0 0 12px rgba(255, 255, 255, 0.2); 
            }
        }

        @keyframes typing {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }
    </style>
</head>
<body>

    <div class="loading-wrapper">
        <div class="spinner"></div>
        <div class="loading-text">
            작업일지로 연결 중입니다<span class="dots"></span>
        </div>
    </div>

</body>
